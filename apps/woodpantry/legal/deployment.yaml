apiVersion: apps/v1
kind: Deployment
metadata:
  name: woodpantry-legal
  namespace: woodpantry
  labels:
    app: woodpantry-legal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: woodpantry-legal
  template:
    metadata:
      labels:
        app: woodpantry-legal
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: legal-pages
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
            - name: legal-pages
              mountPath: /usr/share/nginx/html/privacy.html
              subPath: privacy.html
            - name: legal-pages
              mountPath: /usr/share/nginx/html/terms.html
              subPath: terms.html
            - name: legal-pages
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
      volumes:
        - name: legal-pages
          configMap:
            name: woodpantry-legal-pages
