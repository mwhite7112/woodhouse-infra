apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: rabbitmq
  labels:
    app.kubernetes.io/name: rabbitmq
spec:
  serviceName: rabbitmq-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rabbitmq
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: docker.io/library/rabbitmq:4.1.3-management
          ports:
            - name: amqp
              containerPort: 5672
            - name: management
              containerPort: 15672
            - name: metrics
              containerPort: 15692
          env:
            - name: RABBITMQ_BOOTSTRAP_USER
              value: woodpantry
            - name: RABBITMQ_BOOTSTRAP_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: rabbitmq-password
            - name: RABBITMQ_ERLANG_COOKIE
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: rabbitmq-erlang-cookie
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -ec
                  - |
                    rabbitmqctl await_startup
                    rabbitmqctl add_user "${RABBITMQ_BOOTSTRAP_USER}" "${RABBITMQ_BOOTSTRAP_PASS}" 2>/dev/null || \
                      rabbitmqctl change_password "${RABBITMQ_BOOTSTRAP_USER}" "${RABBITMQ_BOOTSTRAP_PASS}"
                    rabbitmqctl set_user_tags "${RABBITMQ_BOOTSTRAP_USER}" administrator
                    rabbitmqctl set_permissions -p / "${RABBITMQ_BOOTSTRAP_USER}" ".*" ".*" ".*"
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
            - name: definitions
              mountPath: /etc/rabbitmq/definitions.json
              subPath: definitions.json
              readOnly: true
            - name: config
              mountPath: /etc/rabbitmq/conf.d/20-definitions.conf
              subPath: 20-definitions.conf
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          readinessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - check_port_connectivity
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - ping
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: definitions
          configMap:
            name: rabbitmq-definitions
        - name: config
          configMap:
            name: rabbitmq-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn
        resources:
          requests:
            storage: 5Gi
